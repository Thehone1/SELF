    use: *ordinary_providers
    filter: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)"
    url: *probe_url
    interval: *probe_interval
    tolerance: *probe_tolerance

  - name: 🇺🇲 美国节点
