mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
ipv6: false

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇺🇲 美国手动
      - 🇰🇷 韩国节点
      - 🇬🇧 英国节点
      - 🇮🇳 印度节点
      - 🇪🇺 欧洲节点
      - 🇹🇷 土耳其节点
      - 🇲🇾 东南亚节点
      - 🫙 自定义
    use: &ordinary_providers
      - Provider_77359D
      - Provider_C9965E

  - name: 🤖 ChatGPT系AI
    type: select
    proxies: [🇺🇲 美国节点, 🇺🇲 美国手动, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🚀 节点选择]
    use: &ai_providers
      - Provider_70AAA8

  - name: 🔵 Google系AI
    type: select
