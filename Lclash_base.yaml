  - name: 🇭🇰 香港节点
    type: url-test
    use: *ordinary_providers
    filter: "(港|HK|Hong Kong)"
    url: &probe_url http://www.gstatic.com/generate_204
    interval: &probe_interval 300
    tolerance: &probe_tolerance 50

  - name: 🇯🇵 日本节点
